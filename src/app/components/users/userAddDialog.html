<h2 mat-dialog-title>Add user</h2>
<mat-dialog-content>
  <form [formGroup]="addUserForm">
    <mat-form-field appearance="outline" style="width: 100%; margin-top: 8px;">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" />
      <mat-error *ngIf="addUserForm.get('name')?.hasError('required') && addUserForm.get('name')?.touched">
        Name is required
      </mat-error>
    </mat-form-field>
    <mat-form-field appearance="outline" style="width: 100%;">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email" />
      <mat-error *ngIf="addUserForm.get('email')?.hasError('required') && addUserForm.get('email')?.touched">
        Email is required
      </mat-error>
      <mat-error
        *ngIf="addUserForm.get('email')?.hasError('email') && !addUserForm.get('email')?.hasError('required') && addUserForm.get('email')?.touched">
        Enter a valid email
      </mat-error>
    </mat-form-field>
    <mat-form-field appearance="outline" style="width: 100%;">
      <mat-label>Password</mat-label>
      <input matInput formControlName="password" type="password" />
      <mat-error *ngIf="addUserForm.get('password')?.hasError('required') && addUserForm.get('password')?.touched">
        Password is required
      </mat-error>
      <mat-error
        *ngIf="addUserForm.get('password')?.hasError('minlength') && !addUserForm.get('password')?.hasError('required') && addUserForm.get('password')?.touched">
        Password must be at least 6 characters
      </mat-error>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-button color="primary" [mat-dialog-close]="formValue" [disabled]="addUserForm.invalid"
    cdkFocusInitial>Save</button>
</mat-dialog-actions>
